groups:
  - name: credit_scoring_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(api_errors_total[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Error rate above 1%"
          description: "API error rate is {{ $value | humanizePercentage }} over last 5m"

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, rate(api_latency_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency above 500ms"
          description: "p95 latency is {{ $value | humanizeDuration }}"

      - alert: APIDown
        expr: up{job="credit_scoring_api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Credit Scoring API is down"

      - alert: ModelReloadFailing
        expr: increase(model_reload_failure_total[15m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Model background reload is failing"
          description: "Registry reload failed {{ $value }} times in last 15m — API is serving a stale model"

      - alert: HighFeatureMissingRate
        expr: histogram_quantile(0.9, rate(feature_missing_rate_bucket[10m])) > 0.7
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High feature missing rate (>70% null at p90)"
          description: "p90 feature missing rate is {{ $value | humanizePercentage }} — check upstream data pipeline"
