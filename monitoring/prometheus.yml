global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "credit_scoring_api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  # Pushgateway — receives batch-job metrics from NannyML monitor runs.
  # honor_labels=true preserves the job="nannyml_monitor" label pushed by the script.
  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
