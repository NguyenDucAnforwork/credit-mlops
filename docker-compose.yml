version: "3.9"

services:
  # ── PostgreSQL — audit log for predictions ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-credituser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-creditpass}
      POSTGRES_DB: ${POSTGRES_DB:-creditdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-credituser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis — rate limiting ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI inference service ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./api:/app/api   # bind mount: edit api/ locally, changes visible immediately
      - ./src:/app/src   # bind mount: edit src/ locally, changes visible immediately
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-credituser}:${POSTGRES_PASSWORD:-creditpass}@postgres:5432/${POSTGRES_DB:-creditdb}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped

  # ── Streamlit UI ─────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000   # resolved via Docker internal network
      TEST_DATA_PATH: /data/processed/test_data.csv   # Mode A: load real rows by label+index
    volumes:
      - ./ui:/app   # bind mount: edit ui/ locally, changes visible immediately
      - ./data:/data:ro   # read-only access to test_data.csv for Mode A
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - api

  # ── Alertmanager ──────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"

  # ── Prometheus Pushgateway — receives NannyML batch-job metrics ───────────
  pushgateway:
    image: prom/pushgateway:v1.10.0
    ports:
      - "9091:9091"
    # Persist pushed metrics to disk — without this, batch-job metrics (NannyML)
    # are held in memory only and vanish on every container restart (e.g. after a reboot).
    # user: root is required because the image runs as 'nobody' (UID 65534) and cannot
    # write to the root-owned named volume otherwise (permission denied on the store file).
    user: root
    command:
      - "--persistence.file=/data/pushgateway.store"
      - "--persistence.interval=1m"
    volumes:
      - pushgateway_data:/data
    restart: unless-stopped

  # ── NannyML monitor — run on demand: docker compose --profile monitoring run --rm nannyml_monitor
  nannyml_monitor:
    build:
      context: .
      dockerfile: monitoring/Dockerfile.monitor
    profiles: ["monitoring"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-credituser}:${POSTGRES_PASSWORD:-creditpass}@postgres:5432/${POSTGRES_DB:-creditdb}
      PUSHGATEWAY_URL: http://pushgateway:9091
    env_file: .env
    volumes:
      - ./reports:/app/reports       # persist HTML + JSON reports to host
      - ./monitoring:/app/monitoring  # persist nannyml_reference.csv cache to host
    depends_on:
      postgres:
        condition: service_healthy
      pushgateway:
        condition: service_started
    restart: "no"

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  pushgateway_data:
